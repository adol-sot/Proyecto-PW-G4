<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo cambiar contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-700 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl p-6 md:p-10 w-full max-w-md text-center shadow-2xl">
        <h1 class="text-2xl md:text-4xl font-bold text-black mb-6 ">
            Recuperación de cuenta
        </h1>
        <div class="flex justify-center mb-6">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQMFRtxsid9VYIwxAvqGz69bVsYU8kJ3d_K-Q&s" class="h-32 object-cover rounded-lg">
        </div>
        <p class="text-base md:text-xl text-gray-800 mb-2 ">
            Para seguir con el proceso de reestablecer su contraseña darle click al siguiente recuadro: 
        </p>
        <a href="http://localhost:5173/cambiar-contra">
            <button class ="mt-2 bg-yellow-300 w-full rounded-full py-2 text-black font-bold text-2xl hover:bg-amber-600 hover:text-white" type="button">
                Reestablecer contraseña
            </button>
        </a>
        
        <p class="mt-2 text-xs md:text-sm text-gray-600 italic">
            Si usted no solicitó este cambio, se recomienda que tome medidas de seguridad para proteger su cuenta.
        </p>
    </div>
</body>
</html>
